name: Monitor main branch

on:
  push:
    branches:
      - master
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    environment: GITHUB_MONITOR

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run check
        env:
          GITHUB_OWNER: ${{ secrets.OWNER }}
          GITHUB_REPO: ${{ secrets.REPO }}
          GITHUB_BRANCH: ${{ secrets.BRANCH }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          TO_EMAIL: ${{ secrets.TO_EMAIL }}
          FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        run: node scripts/check-commit.js

      - name: Commit state.json if changed
        run: |
          if git diff --quiet state.json; then
            echo "No changes in state.json"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add state.json
            git commit -m "chore: update monitored commit state"
            git push
          fi
